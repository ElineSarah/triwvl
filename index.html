<style>

.gr{display:flex;align-items:center;border-bottom:1px solid #f5f5f5;padding:0 6px;gap:3px;font-size:11px;white-space:nowrap;overflow:hidden;cursor:pointer}.gr:hover{background:#f8f9fa}.gr.ct{font-weight:600;background:#f5f7fa}.gr .d{width:4px;height:4px;border-radius:50%;flex-shrink:0}.gr .tn{overflow:hidden;text-overflow:ellipsis;flex:1}.gr .tg{font-size:7px;color:#999;transition:transform .2s;flex-shrink:0}.gr .tg.c{transform:rotate(-90deg)}.gr .ac{opacity:0;font-size:8px;cursor:pointer;color:#999}.gr:hover .ac{opacity:1}

.gnl{position:absolute;top:0;bottom:0;width:2px;background:#26a69a;z-index:8;pointer-events:none}.gnlb{position:absolute;top:2px;transform:translateX(-50%);font-size:8px;font-weight:700;color:#26a69a;z-index:9;pointer-events:none}
.gdl{position:absolute;top:0;bottom:0;width:1.5px;background:#e53935;opacity:.6;z-index:4}.gdll{position:absolute;top:2px;left:4px;font-size:8px;color:#e53935;font-weight:600;white-space:nowrap;z-index:5;pointer-events:none}
.gev{position:absolute;top:0;bottom:0;width:0;z-index:6}.gevd{position:absolute;top:50%;left:-4px;width:8px;height:8px;background:#f9a825;transform:translateY(-50%) rotate(45deg);border-radius:1px;cursor:pointer}.gevd:hover{transform:translateY(-50%) rotate(45deg) scale(1.4)}.gevt{position:absolute;bottom:calc(50% + 10px);left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:20}.gevd:hover+.gevt{opacity:1}
.gg{position:absolute;top:0;bottom:0;width:1px;background:#f0f0f0;z-index:1}
.leg{display:flex;gap:8px;margin-bottom:5px;flex-wrap:wrap;font-size:10px;color:#888}.leg .li{display:flex;align-items:center;gap:3px}.leg .ld{width:5px;height:5px;border-radius:50%}.leg .ldm{width:5px;height:5px;background:#f9a825;transform:rotate(45deg)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;display:none;align-items:center;justify-content:center}.mo.active{display:flex}.mob{background:#fff;border-radius:10px;padding:18px 22px;width:100%;max-width:380px;max-height:80vh;overflow-y:auto}.mob h3{font-size:14px;margin-bottom:10px}.mf{margin-bottom:9px}.mf label{display:block;font-size:10px;font-weight:500;color:#666;margin-bottom:2px}.mf input,.mf select{width:100%;padding:6px 9px;border:1px solid #ddd;border-radius:5px;font:inherit;font-size:12px}.mf input:focus,.mf select:focus{outline:none;border-color:#3b5998}.ma{display:flex;justify-content:flex-end;gap:5px;margin-top:12px}
.el{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;max-height:180px;overflow-y:auto}.eli{display:flex;align-items:center;gap:5px;padding:4px 7px;background:#f5f7fa;border-radius:5px;font-size:11px}.eli input{flex:1;border:none;background:transparent;font:inherit;outline:none;padding:2px 3px;border-radius:3px}.eli input:focus{background:#e8f0fe}.eli input[type="date"]{width:100px;flex:none;font-size:10px;color:#666}.eli .rm{cursor:pointer;opacity:.4;font-size:9px}.eli .rm:hover{opacity:1}
.tl{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}.tt{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:10px;background:#f0f0f0;font-size:10px}.tt .rm{cursor:pointer;opacity:.4;font-size:7px}.tt .rm:hover{opacity:1}
@media(max-width:768px){.gsd{width:130px}.go{height:260px}.bs{grid-template-columns:repeat(2,1fr)}.cards{grid-template-columns:repeat(2,1fr)}}

<body>
<div class="toast" id="toast"></div>
<div id="login" class="login"><h2>TRI-WVL Planning</h2><p>Voer het wachtwoord in om de planning te bekijken</p><div class="em hidden" id="lerr">Verkeerd wachtwoord</div><input id="lpw" type="password" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')doLogin()"><button onclick="doLogin()">Openen</button></div>
<div id="app" class="hidden">
<header><div class="hi"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span class="ht" id="htv">TRI-WVL</span><input class="ht ed hidden" id="hte" onchange="savePrj()"><div class="hd" id="hd"></div></div><div class="ha" id="ha"></div></div></header>
<main><div id="mb"></div><div class="cards" id="cards"></div><section style="margin-bottom:12px"><div class="st">Tijdslijn</div><div class="hn">Hover &#9670; voor events. &#9660; om in/uit te klappen. Scroll horizontaal met trackpad.</div><div class="leg" id="leg"></div><div class="go"><div class="gsd"><div class="gsh">Taken</div><div class="gss" id="gs"></div></div><div class="gtl" id="gtl"><div class="gti" id="gi"></div></div></div></section><section class="pn"><div class="st">Budget</div><div class="bs" id="bsum"></div><div id="btree"></div><button class="ab hidden" id="abc" onclick="addBCat()">+ Deelbudget</button></section></main>
</div>
<div class="mo" id="mo"><div class="mob" id="mob"></div></div>
<script>
var API='https://api.npoint.io/6fe4a7f303e68d62a025',VIEW_PW='TRIWVL',EDIT_PW='TRIWVL2027*',MW=60,RH=28,CH=32;
var CAT_C=['#8e24aa','#43a047','#ef6c00','#1565c0','#00838f','#c62828'];
function fD(i){if(!i)return'';var p=i.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fT(d){return new Date(d).toLocaleDateString('nl-BE')+' '+new Date(d).toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'});}
function fN(n){return'€ '+n.toLocaleString('nl-BE');}
function cc(i){return CAT_C[i%CAT_C.length];}
function countdown(){var now=new Date(),end=new Date(S.projectEnd);if(end<=now)return'Afgelopen';var totalDays=Math.ceil((end-now)/(1000*60*60*24));var months=0,tmp=new Date(now);while(true){var next=new Date(tmp.getFullYear(),tmp.getMonth()+1,tmp.getDate());if(next>end)break;months++;tmp=next;}var remainDays=Math.ceil((end-tmp)/(1000*60*60*24));return'Nog '+months+' mnd'+(remainDays>0?', '+remainDays+' d':'')+' ('+totalDays+' dagen)';}
var DEF={projectName:'TRI-WVL',projectStart:'2026-10-11',projectEnd:'2027-11-30',categories:[{id:'art',name:'Artistiek'},{id:'comm',name:'Communicatie'},{id:'publ',name:'Publiekswerking'},{id:'overig',name:'Overig'}],team:[],tasks:[{id:1,name:'Concept ontwikkeling',cat:'art',start:'2026-10-11',end:'2026-12-31',parent:null,owner:''},{id:2,name:'Artistieke selectie',cat:'art',start:'2027-01-01',end:'2027-03-31',parent:null,owner:''},{id:3,name:'Repetities & productie',cat:'art',start:'2027-04-01',end:'2027-09-30',parent:null,owner:''},{id:4,name:'Communicatiestrategie',cat:'comm',start:'2026-10-11',end:'2026-12-15',parent:null,owner:''},{id:5,name:'Visuele identiteit',cat:'comm',start:'2026-12-01',end:'2027-02-28',parent:null,owner:''},{id:6,name:'Campagne uitrol',cat:'comm',start:'2027-06-01',end:'2027-11-30',parent:null,owner:''},{id:7,name:'Doelgroepanalyse',cat:'publ',start:'2026-10-11',end:'2026-12-31',parent:null,owner:''},{id:8,name:'Educatieve programma\'s',cat:'publ',start:'2027-03-01',end:'2027-08-31',parent:null,owner:''},{id:9,name:'Ticketing & registratie',cat:'publ',start:'2027-07-01',end:'2027-11-30',parent:null,owner:''},{id:10,name:'Subsidiedossier',cat:'overig',start:'2026-10-11',end:'2027-01-31',parent:null,owner:''},{id:11,name:'Logistiek & locatie',cat:'overig',start:'2027-04-01',end:'2027-10-31',parent:null,owner:''},{id:12,name:'Evaluatie & rapportage',cat:'overig',start:'2027-10-01',end:'2027-11-30',parent:null,owner:''}],deadlines:[{id:'d1',name:'Subsidie-indiening',date:'2027-01-15'},{id:'d2',name:'Campagne lancering',date:'2027-06-01'},{id:'d3',name:'Evenement',date:'2027-10-15'}],events:[{id:'e1',name:'Kick-off',date:'2026-10-20'},{id:'e2',name:'Persconferentie',date:'2027-05-15'}],budget:[{id:'bc1',name:'Artistiek',items:[{id:'bi1',name:'Honoraria',begroot:15000,aangepast:15000,besteed:0},{id:'bi2',name:'Productie',begroot:8000,aangepast:8000,besteed:0}]},{id:'bc2',name:'Communicatie',items:[{id:'bi3',name:'Design & druk',begroot:5000,aangepast:5000,besteed:0},{id:'bi4',name:'Online',begroot:3000,aangepast:3000,besteed:0}]},{id:'bc3',name:'Publiekswerking',items:[{id:'bi5',name:'Educatie',begroot:4000,aangepast:4000,besteed:0}]},{id:'bc4',name:'Overig',items:[{id:'bi6',name:'Logistiek',begroot:10000,aangepast:10000,besteed:0},{id:'bi7',name:'Administratie',begroot:2000,aangepast:2000,besteed:0}]}],nextId:13,lastSaved:null,collapsed:{}};
var S=JSON.parse(JSON.stringify(DEF)),EM=false;
function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast show '+(t||'ok');setTimeout(function(){e.className='toast';},2000);}
function doLogin(){var v=document.getElementById('lpw').value;if(v===VIEW_PW||v===EDIT_PW){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');if(v===EDIT_PW)EM=true;load();}else{document.getElementById('lerr').classList.remove('hidden');document.getElementById('lpw').value='';document.getElementById('lpw').focus();}}
function load(){fetch(API).then(function(r){return r.json();}).then(function(d){if(d&&d.projectName){S=d;if(!S.collapsed)S.collapsed={};if(!S.events)S.events=[];if(!S.budget)S.budget=DEF.budget;}renderAll();}).catch(function(){renderAll();});}
function pub(){S.lastSaved=new Date().toISOString();fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(S)}).then(function(r){if(r.ok)toast('Gepubliceerd!');else toast('Fout '+r.status,'err');}).catch(function(){toast('Netwerk fout','err');});}
function askEdit(){var p=prompt('Bewerkwachtwoord:');if(p===EDIT_PW){EM=true;renderAll();toast('Bewerkmodus');}else if(p!==null)toast('Verkeerd','err');}
function exitEdit(){EM=false;renderAll();}
function savePrj(){S.projectName=document.getElementById('hte').value.trim()||'Project';var ps=document.getElementById('ps');var pe=document.getElementById('pe');if(ps)S.projectStart=ps.value;if(pe)S.projectEnd=pe.value;renderAll();}
function getMs(){var ms=[],a=new Date(S.projectStart),b=new Date(S.projectEnd),d=new Date(a.getFullYear(),a.getMonth(),1),end=new Date(b.getFullYear(),b.getMonth()+1,0);while(d<=end){ms.push({y:d.getFullYear(),m:d.getMonth()});d=new Date(d.getFullYear(),d.getMonth()+1,1);}return ms;}
function mL(x){return['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'][x.m]+"'"+String(x.y).slice(2);}
function px(ds,tw){var a=new Date(S.projectStart),b=new Date(S.projectEnd),d=new Date(ds),t=b-a;return t<=0?0:Math.max(0,Math.min(tw,((d-a)/t)*tw));}
function bT(){var b=0,a=0,s=0;S.budget.forEach(function(c){c.items.forEach(function(i){b+=i.begroot;a+=i.aangepast;s+=i.besteed;});});return{b:b,a:a,s:s,r:a-s};}
function bcT(c){var b=0,a=0,s=0;c.items.forEach(function(i){b+=i.begroot;a+=i.aangepast;s+=i.besteed;});return{b:b,a:a,s:s,r:a-s};}
function isC(k){return S.collapsed[k]===true;}
function togC(k){S.collapsed[k]=!S.collapsed[k];renderGantt();}
function renderAll(){
  var tv=document.getElementById('htv'),te=document.getElementById('hte'),hd=document.getElementById('hd');
  if(EM){tv.classList.add('hidden');te.classList.remove('hidden');te.value=S.projectName;hd.innerHTML='<span class="dlabel">Start:</span> <input type="date" id="ps" value="'+S.projectStart+'" onchange="savePrj()"> <span class="dlabel">Einde:</span> <input type="date" id="pe" value="'+S.projectEnd+'" onchange="savePrj()"> <span class="dlabel">('+fD(S.projectStart)+' — '+fD(S.projectEnd)+')</span>';}
  else{tv.classList.remove('hidden');te.classList.add('hidden');tv.textContent=S.projectName;hd.innerHTML=fD(S.projectStart)+' — '+fD(S.projectEnd);}
  document.title=S.projectName+' | Planning';
  document.getElementById('ha').innerHTML=EM?'<button class="btn" onclick="addTaskM()">+ Taak</button><button class="btn" onclick="editTeamM()">+ Team</button><button class="btn" onclick="addDLM()">+ Deadline</button><button class="btn" onclick="addEVM()">+ Event</button><button class="btn" onclick="editCatsM()">+ Cat.</button><button class="btn bp" onclick="expCSV()">⬇ CSV</button>':'<button class="btn bp" onclick="expCSV()">⬇ CSV</button>';
  document.getElementById('mb').innerHTML=EM?'<div class="mb e"><span>✏ Bewerkmodus</span><div class="ac"><button class="btn bg" onclick="pub()">⬆ Publiceren</button><button class="btn" onclick="exitEdit()">Sluiten</button></div></div>':'<div class="mb v"><span>Bekijkmodus'+(S.lastSaved?' — '+fT(S.lastSaved):'')+'</span><div class="ac"><button class="btn" onclick="askEdit()">✏ Bewerken</button><button class="btn" onclick="load()">↻ Vernieuwen</button></div></div>';
  document.getElementById('abc').classList.toggle('hidden',!EM);
  renderCards();renderBudget();renderGantt();renderLeg();
