<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRI-WVL | Planning</title>
<style>
:root{--blue:#2f5597;--bg:#f6f7fb;--line:#e3e5ea;--txt:#222;--muted:#6b7280}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--txt)}
.hidden{display:none!important}
header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;background:#fff;border-bottom:1px solid var(--line)}
h1{margin:0;color:var(--blue);font-size:26px;letter-spacing:.3px}
#hte{font-size:24px;font-weight:700;color:var(--blue);border:1px solid var(--line);border-radius:8px;padding:6px 8px}
main{padding:24px;max-width:1600px;margin:0 auto}
.sub{color:var(--muted);font-size:14px;margin-top:8px}
.btn,.ab{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:600}
.btn:hover,.ab:hover{background:#f0f2f6}
.bp{background:#2f5597;color:white;border-color:#2f5597}
.bg{background:#28a745;color:white;border-color:#28a745}
.bd{background:#dc3545;color:white;border-color:#dc3545}
.ac{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mb{display:flex;justify-content:space-between;align-items:center;margin:0 0 18px 0;padding:10px 12px;border-radius:10px;border:1px solid var(--line)}
.mb.v{background:#fff}.mb.e{background:#fff7e6;border-color:#f2c46d}
#cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.card{position:relative;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
.card label{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;font-weight:700}
.card .v{font-size:22px;font-weight:800;margin-top:6px}.card .s{font-size:12px;color:var(--muted);margin-top:6px}
.ei,.ac{color:#2f5597;cursor:pointer;font-size:13px}
section{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:18px;overflow:hidden}
section h2{font-size:18px;margin:0;padding:16px 18px;border-bottom:1px solid var(--line)}
.gwrap{display:grid;grid-template-columns:260px 1fr;min-height:260px}
#gs{border-right:1px solid var(--line);overflow:auto;max-height:560px;background:#fff}
#gtl{overflow:auto;max-height:560px;position:relative}
.gr{height:28px;display:flex;align-items:center;gap:7px;padding:0 8px;border-bottom:1px solid #f0f0f0;font-size:13px;position:relative}
.gr.ct{height:32px;background:#fafafa;font-weight:700;cursor:pointer}
.tn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto}
.tg{display:inline-block;width:14px;transition:.15s}.tg.c{transform:rotate(-90deg)}
.gm{display:flex;height:32px;position:sticky;top:0;background:#fff;z-index:5;border-bottom:1px solid var(--line)}
.gmc{flex:0 0 auto;padding:8px 6px;text-align:center;font-size:12px;border-right:1px solid #eee;color:#666}
.gmc.cu{font-weight:700;color:#2f5597}
.gg{position:absolute;top:0;border-left:1px solid #eee}
.gnl{position:absolute;top:0;border-left:2px solid #26a69a;z-index:3}.gnlb{position:absolute;top:2px;background:#26a69a;color:white;font-size:10px;padding:1px 3px;border-radius:3px}
.gdl{position:absolute;top:0;border-left:2px solid rgba(229,57,53,.6);z-index:2}.gdll{position:absolute;top:15px;left:4px;white-space:nowrap;color:#b71c1c;font-size:11px}
.gev{position:absolute;top:0;z-index:2}.gevd{width:8px;height:8px;background:#111;transform:rotate(45deg);margin-left:-4px}.gevt{font-size:11px;white-space:nowrap;margin-left:4px}
.gb{position:absolute;cursor:pointer}
#leg{display:flex;gap:14px;flex-wrap:wrap;padding:10px 18px;border-top:1px solid var(--line);font-size:13px;color:#555}.li{display:flex;gap:6px;align-items:center}.ld{width:10px;height:10px;border-radius:50%}.ldm{width:8px;height:8px;background:#111;transform:rotate(45deg)}
#bsum{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;padding:14px 18px}.bsi{background:#f7f8fb;border-radius:10px;padding:12px}.bl{font-size:12px;color:#666}.bv{font-size:20px;font-weight:800;margin-top:4px}
.btbl{width:100%;border-collapse:collapse;font-size:14px}.btbl th,.btbl td{border-top:1px solid #eee;padding:9px 12px;text-align:left}.btbl th{background:#fafafa;color:#666}.btbl input{width:100%;border:1px solid var(--line);border-radius:6px;padding:6px}.cr{font-weight:700;background:#fcfcfc;cursor:pointer}.tr{font-weight:800;background:#f8f8f8}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#f8f9fd,#eef2f8)}
.loginbox{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.08);width:min(420px,92vw);padding:28px}
.loginbox h1{margin-bottom:8px}.loginbox input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;margin:12px 0;font-size:16px}
.err{color:#dc3545;font-size:14px}
#mo{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:50}
#mo.active{display:flex}
#mob{background:#fff;border-radius:14px;box-shadow:0 10px 35px rgba(0,0,0,.18);padding:18px;max-width:620px;width:92vw;max-height:85vh;overflow:auto}
.mf{display:grid;gap:6px;margin:10px 0}.mf input,.mf select{padding:9px;border:1px solid var(--line);border-radius:8px}.ma{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}.eli{display:flex;gap:8px;align-items:center;margin:6px 0}.eli input{flex:1;padding:8px;border:1px solid var(--line);border-radius:8px}.rm{color:#dc3545;cursor:pointer;font-weight:700}.tt{display:inline-flex;gap:6px;align-items:center;background:#eef2f8;border-radius:999px;padding:6px 10px;margin:4px}
#toast{position:fixed;right:20px;bottom:20px;background:#222;color:white;padding:10px 14px;border-radius:10px;opacity:0;pointer-events:none;transition:.2s;z-index:99}
#toast.show{opacity:1}.toast.err,#toast.err{background:#dc3545}.toast.ok,#toast.ok{background:#222}
@media(max-width:800px){.gwrap{grid-template-columns:190px 1fr}header{padding:18px}main{padding:14px}}
</style>
</head>
<body>
<div id="login">
  <div class="loginbox">
    <h1>TRI-WVL</h1>
    <p class="sub">Geef het lees- of bewerkwachtwoord in.</p>
    <input id="lpw" type="password" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn bp" onclick="doLogin()">Openen</button>
    <p id="lerr" class="err hidden">Verkeerd wachtwoord.</p>
  </div>
</div>
<div id="app" class="hidden">
<header>
  <div>
    <h1 id="htv">TRI-WVL</h1>
    <input id="hte" class="hidden" onchange="savePrj()">
    <div id="hd" class="sub"></div>
  </div>
  <div id="ha" class="ac"></div>
</header>
<main>
  <div id="mb"></div>
  <div id="cards"></div>
  <section>
    <h2>Tijdslijn</h2>
    <div class="sub" style="padding:0 18px 12px">Hover voor details. Scroll horizontaal met trackpad.</div>
    <div class="gwrap">
      <div id="gs"></div>
      <div id="gtl"><div id="gi"></div></div>
    </div>
    <div id="leg"></div>
  </section>
  <section>
    <h2>Budget</h2>
    <div id="bsum"></div>
    <div id="btree"></div>
    <div id="abc" class="hidden" style="padding:12px 18px"><button class="ab" onclick="addBCat()">+ Deelbudget</button></div>
  </section>
</main>
</div>
<div id="mo"><div id="mob"></div></div>
<div id="toast" class="toast"></div>
<script>
var API='https://api.npoint.io/6fe4a7f303e68d62a025',VIEW_PW='TRIWVL',EDIT_PW='TRIWVL2027*',MW=60,RH=28,CH=32;
var CAT_C=['#8e24aa','#43a047','#ef6c00','#1565c0','#00838f','#c62828'];
function fD(i){if(!i)return'';var p=i.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fT(d){return new Date(d).toLocaleDateString('nl-BE')+' '+new Date(d).toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'});}
function fN(n){return'€ '+n.toLocaleString('nl-BE');}
function cc(i){return CAT_C[i%CAT_C.length];}
function countdown(){var now=new Date(),end=new Date(S.projectEnd);if(end<=now)return'Afgelopen';var totalDays=Math.ceil((end-now)/(1000*60*60*24));var months=0,tmp=new Date(now);while(true){var next=new Date(tmp.getFullYear(),tmp.getMonth()+1,tmp.getDate());if(next>end)break;months++;tmp=next;}var remainDays=Math.ceil((end-tmp)/(1000*60*60*24));return'Nog '+months+' mnd, '+remainDays+' d ('+totalDays+' dagen)';}
var DEF={projectName:'TRI-WVL',projectStart:'2026-10-11',projectEnd:'2027-11-30',categories:[{id:'art',name:'Artistiek'},{id:'comm',name:'Communicatie'},{id:'publ',name:'Publiekswerking'},{id:'overig',name:'Overig'}],team:[],tasks:[{id:1,name:'Concept ontwikkeling',cat:'art',start:'2026-10-11',end:'2026-12-31',parent:null,owner:''},{id:2,name:'Artistieke selectie',cat:'art',start:'2027-01-01',end:'2027-03-31',parent:null,owner:''},{id:3,name:'Repetities en productie',cat:'art',start:'2027-04-01',end:'2027-09-30',parent:null,owner:''},{id:4,name:'Communicatiestrategie',cat:'comm',start:'2026-10-11',end:'2026-12-15',parent:null,owner:''},{id:5,name:'Visuele identiteit',cat:'comm',start:'2026-12-01',end:'2027-02-28',parent:null,owner:''},{id:6,name:'Campagne uitrol',cat:'comm',start:'2027-06-01',end:'2027-11-30',parent:null,owner:''},{id:7,name:'Doelgroepanalyse',cat:'publ',start:'2026-10-11',end:'2026-12-31',parent:null,owner:''},{id:8,name:'Educatieve programmas',cat:'publ',start:'2027-03-01',end:'2027-08-31',parent:null,owner:''},{id:9,name:'Ticketing en registratie',cat:'publ',start:'2027-07-01',end:'2027-11-30',parent:null,owner:''},{id:10,name:'Subsidiedossier',cat:'overig',start:'2026-10-11',end:'2027-01-31',parent:null,owner:''},{id:11,name:'Logistiek en locatie',cat:'overig',start:'2027-04-01',end:'2027-10-31',parent:null,owner:''},{id:12,name:'Evaluatie en rapportage',cat:'overig',start:'2027-10-01',end:'2027-11-30',parent:null,owner:''}],deadlines:[{id:'d1',name:'Subsidie-indiening',date:'2027-01-15'},{id:'d2',name:'Campagne lancering',date:'2027-06-01'},{id:'d3',name:'Evenement',date:'2027-10-15'}],events:[{id:'e1',name:'Kick-off',date:'2026-10-20'},{id:'e2',name:'Persconferentie',date:'2027-05-15'}],budget:[{id:'bc1',name:'Artistiek',items:[{id:'bi1',name:'Honoraria',begroot:15000,aangepast:15000,besteed:0},{id:'bi2',name:'Productie',begroot:8000,aangepast:8000,besteed:0}]},{id:'bc2',name:'Communicatie',items:[{id:'bi3',name:'Design en druk',begroot:5000,aangepast:5000,besteed:0},{id:'bi4',name:'Online',begroot:3000,aangepast:3000,besteed:0}]},{id:'bc3',name:'Publiekswerking',items:[{id:'bi5',name:'Educatie',begroot:4000,aangepast:4000,besteed:0}]},{id:'bc4',name:'Overig',items:[{id:'bi6',name:'Logistiek',begroot:10000,aangepast:10000,besteed:0},{id:'bi7',name:'Administratie',begroot:2000,aangepast:2000,besteed:0}]}],nextId:13,lastSaved:null,collapsed:{}};
var S=JSON.parse(JSON.stringify(DEF)),EM=false;
function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast show '+(t||'ok');setTimeout(function(){e.className='toast';},2000);}
function doLogin(){var v=document.getElementById('lpw').value;if(v===VIEW_PW||v===EDIT_PW){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');if(v===EDIT_PW)EM=true;load();}else{document.getElementById('lerr').classList.remove('hidden');document.getElementById('lpw').value='';document.getElementById('lpw').focus();}}
function load(){fetch(API).then(function(r){return r.json();}).then(function(d){if(d&&d.projectName){S=d;if(!S.collapsed)S.collapsed={};if(!S.events)S.events=[];if(!S.budget)S.budget=DEF.budget;}renderAll();}).catch(function(){renderAll();});}
function pub(){S.lastSaved=new Date().toISOString();fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(S)}).then(function(r){if(r.ok)toast('Gepubliceerd!');else toast('Fout '+r.status,'err');}).catch(function(){toast('Netwerk fout','err');});}
function askEdit(){var p=prompt('Bewerkwachtwoord:');if(p===EDIT_PW){EM=true;renderAll();toast('Bewerkmodus');}else if(p!==null)toast('Verkeerd','err');}
function exitEdit(){EM=false;renderAll();}
function savePrj(){S.projectName=document.getElementById('hte').value.trim()||'Project';var ps=document.getElementById('ps');var pe=document.getElementById('pe');if(ps)S.projectStart=ps.value;if(pe)S.projectEnd=pe.value;renderAll();}
function getMs(){var ms=[],a=new Date(S.projectStart),b=new Date(S.projectEnd),d=new Date(a.getFullYear(),a.getMonth(),1),end=new Date(b.getFullYear(),b.getMonth()+1,0);while(d<=end){ms.push({y:d.getFullYear(),m:d.getMonth()});d=new Date(d.getFullYear(),d.getMonth()+1,1);}return ms;}
function mL(x){return['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'][x.m]+"'"+String(x.y).slice(2);}
function px(ds,tw){var a=new Date(S.projectStart),b=new Date(S.projectEnd),d=new Date(ds),t=b-a;return t<=0?0:Math.max(0,Math.min(tw,((d-a)/t)*tw));}
function bT(){var b=0,a=0,s=0;S.budget.forEach(function(c){c.items.forEach(function(i){b+=i.begroot;a+=i.aangepast;s+=i.besteed;});});return{b:b,a:a,s:s,r:a-s};}
function bcT(c){var b=0,a=0,s=0;c.items.forEach(function(i){b+=i.begroot;a+=i.aangepast;s+=i.besteed;});return{b:b,a:a,s:s,r:a-s};}
function isC(k){return S.collapsed[k]===true;}
function togC(k){S.collapsed[k]=!S.collapsed[k];renderGantt();}
function renderAll(){var tv=document.getElementById('htv'),te=document.getElementById('hte'),hd=document.getElementById('hd');if(EM){tv.classList.add('hidden');te.classList.remove('hidden');te.value=S.projectName;hd.innerHTML='Start: <input type="date" id="ps" value="'+S.projectStart+'" onchange="savePrj()"> Einde: <input type="date" id="pe" value="'+S.projectEnd+'" onchange="savePrj()"> ('+fD(S.projectStart)+' - '+fD(S.projectEnd)+')';}else{tv.classList.remove('hidden');te.classList.add('hidden');tv.textContent=S.projectName;hd.innerHTML=fD(S.projectStart)+' - '+fD(S.projectEnd);}document.title=S.projectName+' | Planning';document.getElementById('ha').innerHTML=EM?'<button class="btn" onclick="addTaskM()">+ Taak</button><button class="btn" onclick="editTeamM()">+ Team</button><button class="btn" onclick="addDLM()">+ Deadline</button><button class="btn" onclick="addEVM()">+ Event</button><button class="btn" onclick="editCatsM()">+ Cat.</button><button class="btn bp" onclick="expCSV()">CSV</button>':'<button class="btn bp" onclick="expCSV()">CSV</button>';document.getElementById('mb').innerHTML=EM?'<div class="mb e"><span>Bewerkmodus</span><div class="ac"><button class="btn bg" onclick="pub()">Publiceren</button><button class="btn" onclick="exitEdit()">Sluiten</button></div></div>':'<div class="mb v"><span>Bekijkmodus'+(S.lastSaved?' - '+fT(S.lastSaved):'')+'</span><div class="ac"><button class="btn" onclick="askEdit()">Bewerken</button><button class="btn" onclick="load()">Vernieuwen</button></div></div>';document.getElementById('abc').classList.toggle('hidden',!EM);renderCards();renderBudget();renderGantt();renderLeg();}
function renderCards(){var g=document.getElementById('cards'),bt=bT(),cd=countdown();g.innerHTML='<div class="card"><label>Aftelling</label><div class="v">'+cd+'</div><div class="s">Vandaag - '+fD(S.projectEnd)+'</div></div><div class="card"><label>Taken</label><div class="v">'+S.tasks.length+'</div></div><div class="card"><label>Team</label><div class="v">'+S.team.length+'</div>'+(EM?'<span class="ei" onclick="editTeamM()">e</span>':'')+'</div><div class="card"><label>Deadlines</label><div class="v">'+S.deadlines.length+'</div>'+(EM?'<span class="ei" onclick="editDLM()">e</span>':'')+'</div><div class="card"><label>Events</label><div class="v">'+S.events.length+'</div>'+(EM?'<span class="ei" onclick="editEVM()">e</span>':'')+'</div><div class="card"><label>Budget</label><div class="v">'+fN(bt.a)+'</div><div class="s">Rest: '+fN(bt.r)+'</div></div>';}
function renderBudget(){var bt=bT();document.getElementById('bsum').innerHTML='<div class="bsi"><div class="bl">Begroot</div><div class="bv">'+fN(bt.b)+'</div></div><div class="bsi"><div class="bl">Aangepast</div><div class="bv">'+fN(bt.a)+'</div></div><div class="bsi"><div class="bl">Besteed</div><div class="bv">'+fN(bt.s)+'</div></div><div class="bsi"><div class="bl">Resterend</div><div class="bv" style="color:'+(bt.r>=0?'#28a745':'#dc3545')+'">'+fN(bt.r)+'</div></div>';var h='<table class="btbl"><thead><tr><th>Post</th><th>Begroot</th><th>Aangep.</th><th>Besteed</th><th>Rest</th></tr></thead><tbody>';S.budget.forEach(function(c,ci){var ct=bcT(c);h+='<tr class="cr" onclick="togB('+ci+')"><td><span class="tg'+(isC('b'+ci)?' c':'')+'">&darr;</span>'+c.name+'</td><td>'+fN(ct.b)+'</td><td>'+fN(ct.a)+'</td><td>'+fN(ct.s)+'</td><td style="color:'+(ct.r>=0?'#28a745':'#dc3545')+'">'+fN(ct.r)+'</td></tr>';if(!isC('b'+ci)){c.items.forEach(function(it,ii){if(EM)h+='<tr><td style="padding-left:18px"><input value="'+it.name+'" onchange="uB('+ci+','+ii+',\'name\',this.value)"></td><td><input type="number" value="'+it.begroot+'" onchange="uB('+ci+','+ii+',\'begroot\',this.value)"></td><td><input type="number" value="'+it.aangepast+'" onchange="uB('+ci+','+ii+',\'aangepast\',this.value)"></td><td><input type="number" value="'+it.besteed+'" onchange="uB('+ci+','+ii+',\'besteed\',this.value)"></td><td style="color:'+(it.aangepast-it.besteed>=0?'#28a745':'#dc3545')+'">'+fN(it.aangepast-it.besteed)+'</td></tr>';else h+='<tr><td style="padding-left:18px">'+it.name+'</td><td>'+fN(it.begroot)+'</td><td>'+fN(it.aangepast)+'</td><td>'+fN(it.besteed)+'</td><td style="color:'+(it.aangepast-it.besteed>=0?'#28a745':'#dc3545')+'">'+fN(it.aangepast-it.besteed)+'</td></tr>';});if(EM)h+='<tr><td style="padding-left:18px"><button class="ab" onclick="addBI('+ci+')">+ Post</button></td><td></td><td></td><td></td><td></td></tr>';}});h+='<tr class="tr"><td>Totaal</td><td>'+fN(bt.b)+'</td><td>'+fN(bt.a)+'</td><td>'+fN(bt.s)+'</td><td style="color:'+(bt.r>=0?'#28a745':'#dc3545')+'">'+fN(bt.r)+'</td></tr></tbody></table>';document.getElementById('btree').innerHTML=h;}
function togB(ci){S.collapsed['b'+ci]=!isC('b'+ci);renderBudget();}
function uB(ci,ii,f,v){if(f==='name')S.budget[ci].items[ii].name=v;else S.budget[ci].items[ii][f]=parseFloat(v)||0;renderBudget();renderCards();}
function addBI(ci){S.budget[ci].items.push({id:'bi'+Date.now(),name:'Nieuwe post',begroot:0,aangepast:0,besteed:0});renderBudget();}
function addBCat(){modal('<h3>Deelbudget</h3><div class="mf"><label>Naam</label><input id="xn" onkeydown="if(event.key===\'Enter\')doBCat()"></div><div class="ma"><button class="btn" onclick="cM()">Annuleren</button><button class="btn bp" onclick="doBCat()">OK</button></div>');document.getElementById('xn').focus();}
function doBCat(){var n=document.getElementById('xn').value.trim();if(!n)return;S.budget.push({id:'bc'+Date.now(),name:n,items:[]});cM();}

function buildRows(){var rows=[];S.categories.forEach(function(cat,ci){var col=cc(ci),all=S.tasks.filter(function(t){return t.cat===cat.id;}),main=S.tasks.filter(function(t){return t.cat===cat.id&&!t.parent;});rows.push({type:'cat',name:cat.name+' ('+all.length+')',col:col,cid:cat.id,h:CH});if(!isC('cat_'+cat.id)){main.forEach(function(t){var subs=S.tasks.filter(function(x){return x.parent===t.id;});rows.push({type:'task',t:t,col:col,h:RH,hs:subs.length>0});if(subs.length&&!isC('task_'+t.id)){subs.forEach(function(sub){rows.push({type:'sub',t:sub,col:col,h:RH});});}});}});return rows;}
