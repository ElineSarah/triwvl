function editTeamM(){if(!EM)return;var l=S.team.length?S.team.map(function(m,i){return'<span class="tt">'+m+'<span class="rm" onclick="S.team.splice('+i+',1);editTeamM()">x</span></span>';}).join(''):'Nog geen';modal('<h3>Team</h3><div class="tl">'+l+'</div><div class="mf"><label>Nieuw</label><input id="xn" onkeydown="if(event.key===\'Enter\')doAddT()"></div><div class="ma"><button class="btn" onclick="cM()">Sluiten</button><button class="btn bp" onclick="doAddT()">+</button></div>');setTimeout(function(){document.getElementById('xn').focus();},50);}

function editDLM(){if(!EM)return;modal('<h3>Deadlines</h3><div class="el">'+S.deadlines.map(function(d,i){return'<div class="eli"><input value="'+d.name+'" onchange="S.deadlines['+i+'].name=this.value;autoSave()"><input type="date" value="'+d.date+'" onchange="S.deadlines['+i+'].date=this.value;autoSave()"><span class="rm" onclick="S.deadlines.splice('+i+',1);editDLM()">x</span></div>';}).join('')+'</div><div class="ma"><button class="btn" onclick="cM()">Sluiten</button><button class="btn bp" onclick="addDLM()">+</button></div>');}

function doDL(){var n=document.getElementById('xn').value.trim(),d=document.getElementById('xd').value;if(!n||!d)return;S.deadlines.push({id:'d'+Date.now(),name:n,date:d});editDLM();autoSave();}
function editEVM(){if(!EM)return;modal('<h3>Events</h3><div class="el">'+S.events.map(function(e,i){return'<div class="eli"><input value="'+e.name+'" onchange="S.events['+i+'].name=this.value;autoSave()"><input type="date" value="'+e.date+'" onchange="S.events['+i+'].date=this.value;autoSave()"><span class="rm" onclick="S.events.splice('+i+',1);editEVM()">x</span></div>';}).join('')+'</div><div class="ma"><button class="btn" onclick="cM()">Sluiten</button><button class="btn bp" onclick="addEVM()">+</button></div>');}
function addEVM(){modal('<h3>Event</h3><div class="mf"><label>Naam</label><input id="xn" onkeydown="if(event.key===\'Enter\')doEV()"></div><div class="mf"><label>Datum</label><input type="date" id="xd" value="2027-06-01"></div><div class="ma"><button class="btn" onclick="editEVM()">Terug</button><button class="btn bp" onclick="doEV()">OK</button></div>');}
function doEV(){var n=document.getElementById('xn').value.trim(),d=document.getElementById('xd').value;if(!n||!d)return;S.events.push({id:'e'+Date.now(),name:n,date:d});editEVM();autoSave();}
function addTaskM(){if(!EM)return;var oo='<option value="">(Geen)</option>'+S.team.map(function(m){return'<option value="'+m+'">'+m+'</option>';}).join(''),co=S.categories.map(function(c){return'<option value="'+c.id+'">'+c.name+'</option>';}).join(''),po='<option value="">(Hoofdtaak)</option>'+S.tasks.filter(function(t){return!t.parent;}).map(function(t){return'<option value="'+t.id+'">'+t.name+'</option>';}).join('');modal('<h3>Nieuwe taak</h3><div class="mf"><label>Naam</label><input id="xn"></div><div class="mf"><label>Categorie</label><select id="xc">'+co+'</select></div><div class="mf"><label>Verantwoordelijke</label><select id="xo">'+oo+'</select></div><div class="mf"><label>Start</label><input type="date" id="xs" value="'+S.projectStart+'"></div><div class="mf"><label>Einde</label><input type="date" id="xe" value="'+S.projectEnd+'"></div><div class="mf"><label>Subtaak van</label><select id="xp">'+po+'</select></div><div class="ma"><button class="btn" onclick="cM()">Annuleren</button><button class="btn bp" onclick="doAddTask()">OK</button></div>');}
function doAddTask(){var n=document.getElementById('xn').value.trim(),c=document.getElementById('xc').value,o=document.getElementById('xo').value,s=document.getElementById('xs').value,e=document.getElementById('xe').value,p=document.getElementById('xp').value;if(!n||!s||!e){toast('Vul alles in','err');return;}S.tasks.push({id:S.nextId++,name:n,cat:c,start:s,end:e,parent:p?parseInt(p):null,owner:o});cM();autoSave();}
function editTaskM(id){if(!EM)return;var t=S.tasks.find(function(x){return x.id===id;});if(!t)return;var oo='<option value="">(Geen)</option>'+S.team.map(function(m){return'<option value="'+m+'"'+(t.owner===m?' selected':'')+'>'+m+'</option>';}).join(''),co=S.categories.map(function(c){return'<option value="'+c.id+'"'+(t.cat===c.id?' selected':'')+'>'+c.name+'</option>';}).join(''),po='<option value="">(Hoofdtaak)</option>'+S.tasks.filter(function(x){return x.id!==id&&!x.parent;}).map(function(x){return'<option value="'+x.id+'"'+(t.parent===x.id?' selected':'')+'>'+x.name+'</option>';}).join('');modal('<h3>Taak bewerken</h3><div class="mf"><label>Naam</label><input id="xn" value="'+t.name+'"></div><div class="mf"><label>Categorie</label><select id="xc">'+co+'</select></div><div class="mf"><label>Verantwoordelijke</label><select id="xo">'+oo+'</select></div><div class="mf"><label>Start</label><input type="date" id="xs" value="'+t.start+'"></div><div class="mf"><label>Einde</label><input type="date" id="xe" value="'+t.end+'"></div><div class="mf"><label>Subtaak van</label><select id="xp">'+po+'</select></div><div class="ma"><button class="btn" onclick="cM()">Annuleren</button><button class="btn bd" onclick="delTask('+id+')">Verwijderen</button><button class="btn bp" onclick="doSaveTask('+id+')">Opslaan</button></div>');}
function doSaveTask(id){var t=S.tasks.find(function(x){return x.id===id;});if(!t)return;t.name=document.getElementById('xn').value.trim();t.cat=document.getElementById('xc').value;t.owner=document.getElementById('xo').value;t.start=document.getElementById('xs').value;t.end=document.getElementById('xe').value;var p=document.getElementById('xp').value;t.parent=p?parseInt(p):null;cM();autoSave();}
function delTask(id){S.tasks=S.tasks.filter(function(t){return t.id!==id&&t.parent!==id;});cM();autoSave();}

function csvCell(v){return '"' + String(v==null?'':v).replace(/"/g,'""') + '"';}
function expCSV(){
  var rows=[], cm={};
  S.categories.forEach(function(c){cm[c.id]=c.name;});
  rows.push(['Project', S.projectName]);
  rows.push(['Start', fD(S.projectStart)]);
  rows.push(['Einde', fD(S.projectEnd)]);
  rows.push([]);
  rows.push(['TAKEN']);
  rows.push(['Categorie','Taak','Verantwoordelijke','Start','Einde','Subtaak van']);
  S.tasks.forEach(function(t){
    var p=t.parent?(S.tasks.find(function(x){return x.id===t.parent;})||{}).name||'':'';
    rows.push([cm[t.cat]||'',t.name,t.owner||'',fD(t.start),fD(t.end),p]);
  });
  rows.push([]);
  rows.push(['DEADLINES']);
  rows.push(['Naam','Datum']);
  S.deadlines.forEach(function(d){ rows.push([d.name,fD(d.date)]); });
  rows.push([]);
  rows.push(['EVENTS']);
  rows.push(['Naam','Datum']);
  S.events.forEach(function(e){ rows.push([e.name,fD(e.date)]); });
  rows.push([]);
  rows.push(['BUDGET']);
  rows.push(['Deelbudget','Post','Begroot','Aangepast','Besteed','Resterend']);
  S.budget.forEach(function(c){ c.items.forEach(function(it){ rows.push([c.name,it.name,it.begroot,it.aangepast,it.besteed,it.aangepast-it.besteed]); }); });
  var bt=bT(); rows.push(['TOTAAL','',bt.b,bt.a,bt.s,bt.r]);
  rows.push([]);
  rows.push(['TEAM']); rows.push(['Naam']);
  S.team.forEach(function(m){ rows.push([m]); });
  var csv='\ufeff' + rows.map(function(r){ return r.map(csvCell).join(';'); }).join('\n');
  var b=new Blob([csv],{type:'text/csv;charset=utf-8;'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u; a.download=S.projectName+'_Planning.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
}
